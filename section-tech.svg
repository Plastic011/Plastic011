<svg width="1200" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6ff0">
        <animate attributeName="stop-color" values="#7c6ff0;#4f7cff;#22d3c8;#4f7cff;#7c6ff0" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#4f7cff">
        <animate attributeName="stop-color" values="#4f7cff;#22d3c8;#7c6ff0;#22d3c8;#4f7cff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3c8">
        <animate attributeName="stop-color" values="#22d3c8;#7c6ff0;#4f7cff;#7c6ff0;#22d3c8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <clipPath id="c"><rect x="0" y="0" width="1200" height="150" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <rect width="1200" height="150" fill="#0d1224"/>
    <circle cx="150" cy="20" r="110" fill="#7c6ff0" opacity="0.18" filter="url(#b)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 30,20; -10,25; 0,0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="130" r="110" fill="#22d3c8" opacity="0.16" filter="url(#b)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -25,-15; 15,10; 0,0" dur="17s" repeatCount="indefinite"/>
    </circle>
    <rect width="1200" height="150" fill="none" stroke="#1e2740" stroke-width="2"/>

    <g>
      <rect x="536.0" y="34" width="128.0" height="24" rx="12" fill="#11162a" stroke="#1e2740"/>
      <text x="600" y="51" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="url(#g1)" text-anchor="middle">TECH STACK</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="3s" repeatCount="indefinite"/>
    </g>

    <text x="600" y="98" font-family="Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#f4f5f7" text-anchor="middle">Technologies I Work With
      <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.15s" fill="freeze"/>
    </text>
    
  </g>
</svg>